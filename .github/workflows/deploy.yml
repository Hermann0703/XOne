# =============================================================================
# XOne — 生产部署工作流 (Deploy)
# =============================================================================
# Trigger: push to main (after CI passes) or manual dispatch
# =============================================================================

name: Deploy to Production

on:
  workflow_run:
    workflows: ["XOne CI/CD Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署目标'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # 不取消进行中的部署

jobs:
  deploy:
    name: Deploy — ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    # 仅 CI 成功时触发 (手动触发无此限制)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://${{ vars.DOMAIN }}
    permissions:
      packages: read     # 拉取 GHCR 镜像

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 设置 SSH agent ─────────────────────────────────────────
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # ── 构建 Docker 镜像标签 ──────────────────────────────────
      - name: Set Docker image tag
        id: tag
        run: |
          echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      # ── 复制 compose + 配置到服务器 ────────────────────────────
      - name: Copy deployment files to server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p /opt/xone/{docker,scripts,certbot/{conf,www}}"
          scp docker/docker-compose.prod.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/xone/docker/
          scp docker/nginx.conf ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/xone/docker/
          scp scripts/setup-ssl.sh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/xone/scripts/

      # ── 写入服务器 .env ────────────────────────────────────────
      - name: Write production .env
        run: |
          echo "${{ secrets.SERVER_ENV }}" | ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "cat > /opt/xone/.env"

      # ── Docker Compose 拉取镜像 + 启动 ─────────────────────────
      - name: Deploy with Docker Compose
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_EOF'
            set -euo pipefail
            cd /opt/xone

            # 登录 GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            docker compose -f docker/docker-compose.prod.yml pull

            # 重启服务 (仅更新有变化的服务)
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans

            # 清理旧镜像
            docker image prune -af --filter "until=24h"

            echo "[deploy] 服务已更新，等待健康检查..."
          DEPLOY_EOF

      # ── 健康检查 ────────────────────────────────────────────────
      - name: Health check
        id: health
        run: |
          DOMAIN="${{ vars.DOMAIN }}"
          MAX_RETRIES=30
          RETRY_COUNT=0

          until curl -fsSL "https://${DOMAIN}/health" 2>/dev/null; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "[health] ERROR: Nginx 未就绪 after ${MAX_RETRIES} retries"
              exit 1
            fi
            echo "[health] 等待中... (${RETRY_COUNT}/${MAX_RETRIES})"
            sleep 2
          done

          echo "[health] ✓ Nginx OK"

          # 检查 API 健康
          API_HEALTH=$(curl -fsSL "https://${DOMAIN}/api/v1/health" 2>/dev/null || echo '{"status":"down"}')
          echo "[health] API: ${API_HEALTH}"

          if echo "${API_HEALTH}" | grep -q '"status":"ok"'; then
            echo "[health] ✓ API OK — 后端正常运行"
          else
            echo "[health] ⚠ API 可能正在启动... (alembic 迁移需时)"
          fi

      # ── 部署通知 ────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "════════════════════════════════════"
          echo "  部署完成"
          echo "  时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  分支: ${{ steps.tag.outputs.BRANCH }}"
          echo "  提交: ${{ steps.tag.outputs.TAG }}"
          echo "  环境: ${{ inputs.environment || 'production' }}"
          echo "  地址: https://${{ vars.DOMAIN }}"
          echo "════════════════════════════════════"

# =============================================================================
# XOne — 个人/工作一体化管理平台
# Docker 开发环境 Compose 编排文件
# =============================================================================
# 用法:
#   cp .env.example .env
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml down
# =============================================================================
x-common-env: &common-env
  MODE: ${MODE:-development}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xone:xone_dev@postgres:5432/xone}
  MONGODB_URL: ${MONGODB_URL:-mongodb://admin:xone_dev@mongodb:27017}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  MEILISEARCH_URL: ${MEILISEARCH_URL:-http://meilisearch:7700}
  MEILISEARCH_KEY: ${MEILISEARCH_KEY:-xone_dev_key}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  MINIO_URL: ${MINIO_URL:-http://minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}

x-backend-base: &backend-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.backend
  environment:
    <<: *common-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - xone

# ---------------------------------------------------------------------------
# 服务定义
# ---------------------------------------------------------------------------
services:
  # ==========================================================================
  # Nginx — 反向代理 & 静态文件入口
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: xone-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - xone
    restart: unless-stopped

  # ==========================================================================
  # Frontend — Next.js 开发服务器 (HMR)
  # ==========================================================================
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: xone-frontend
    ports:
      - "3000:3000"
    # NOTE: 不使用源码挂载，使用 Dockerfile 构建的 standalone 输出 (server.js)
    # 如需 HMR 开发模式，用 docker-compose.dev.yml
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: /api
      HOSTNAME: "0.0.0.0"
    networks:
      - xone
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Backend — FastAPI 开发服务器 (自动重载)
  # ==========================================================================
  backend:
    <<: *backend-base
    container_name: xone-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app              # 源码挂载，支持 auto-reload
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==========================================================================
  # PostgreSQL 16 — 主关系数据库
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: xone-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: xone
      POSTGRES_PASSWORD: xone_dev
      POSTGRES_DB: xone
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - xone
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xone -d xone"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # MongoDB 7 — 文档数据库 (灵活数据 / AI 模块)
  # ==========================================================================
  mongodb:
    image: mongo:7
    container_name: xone-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: xone_dev
      MONGO_INITDB_DATABASE: xone
    volumes:
      - mongodata:/data/db
    networks:
      - xone
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis 7 — 缓存 / Celery Broker / 会话
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: xone-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - xone
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Meilisearch — 全文搜索引擎
  # ==========================================================================
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: xone-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: xone_dev_key
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    volumes:
      - meilidata:/meili_data
    networks:
      - xone
    restart: unless-stopped

  # ==========================================================================
  # Qdrant — 向量数据库 (AI / RAG)
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: xone-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - xone
    restart: unless-stopped

  # ==========================================================================
  # MinIO — S3 兼容对象存储 (文件 / 附件)
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: xone-minio
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - xone
    restart: unless-stopped

  # ==========================================================================
  # Celery Worker — 异步任务执行
  # ==========================================================================
  celery:
    <<: *backend-base
    container_name: xone-celery
    command: celery -A app.tasks worker --loglevel=info
    ports: []                     # Worker 无需暴露端口
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # Celery Beat — 定时任务调度
  # ==========================================================================
  celery-beat:
    <<: *backend-base
    container_name: xone-celery-beat
    command: celery -A app.tasks beat --loglevel=info
    ports: []
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

# ---------------------------------------------------------------------------
# 命名卷 — 数据持久化
# ---------------------------------------------------------------------------
volumes:
  pgdata:
  mongodata:
  redisdata:
  meilidata:
  qdrantdata:
  miniodata:

# ---------------------------------------------------------------------------
# 网络
# ---------------------------------------------------------------------------
networks:
  xone:
    driver: bridge
    name: xone

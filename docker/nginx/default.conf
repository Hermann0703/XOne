# =============================================================================
# XOne — Nginx 反向代理配置 (开发环境)
# =============================================================================
# 路由规则:
#   /          → Frontend  (Next.js Dev Server :3000)
#   /api/      → Backend   (FastAPI :8000)
#   /api/docs  → Backend   (FastAPI Swagger Docs)
#   WebSocket  ↑ 自动升级连接
# =============================================================================

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # ------------------------------------------------------------------
    # 通用代理头
    # ------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------------------------------------------------------------------
    # API 文档 (Swagger / ReDoc) — 转发到 Backend
    # ------------------------------------------------------------------
    location /api/docs {
        proxy_pass http://backend_upstream/docs;

        # WebSocket 支持（Swagger 可能用到）
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ------------------------------------------------------------------
    # API 请求 — 转发到 Backend
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_upstream/api/;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（开发环境宽松）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ------------------------------------------------------------------
    # 前端静态资源 & Next.js HMR — 转发到 Frontend
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://frontend_upstream;

        # WebSocket 支持（Next.js HMR 需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
